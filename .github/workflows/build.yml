name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: install rust nightly
      run: |
        rustup toolchain install nightly --component rust-src llvm-tools-preview
        rustup target add x86_64-unknown-none --toolchain nightly

    - name: install system deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq xorriso grub-pc-bin

    - name: build kernel
      run: make elf

    - name: build iso
      run: make iso

    - name: upload iso
      uses: actions/upload-artifact@v4
      with:
        name: omnos-iso
        path: target/x86_64-unknown-none/release/omnos.iso

    - name: upload kernel elf
      uses: actions/upload-artifact@v4
      with:
        name: omnos-kernel
        path: target/x86_64-unknown-none/release/omnos.bin
